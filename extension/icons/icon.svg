<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Radar gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="sweep" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#334155" stroke-width="2"/>

  <!-- Radar grid rings -->
  <circle cx="64" cy="64" r="15" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.6"/>
  <circle cx="64" cy="64" r="30" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
  <circle cx="64" cy="64" r="45" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Crosshairs -->
  <line x1="64" y1="4" x2="64" y2="124" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="64" x2="124" y2="64" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Radar sweep (upper-right quadrant arc) -->
  <path d="M64 4 A60 60 0 0 1 124 64" fill="none" stroke="url(#sweep)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bold W letterform -->
  <text x="64" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#letter)" letter-spacing="-2">W</text>
</svg>
