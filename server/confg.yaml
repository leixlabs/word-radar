# Word Radar Server 默认配置
# 环境变量会覆盖此文件中的值

server:
  port: "8787"                    # 监听端口

obsidian:
  vaultPath: "/obsidian"  # Obsidian Vault 路径
  wordsDir: "英语学习/words"        # 生词本存储目录（相对于 Vault）
  dailyNoteFormat: "Word Radar - {date}.md"  # 每日笔记文件名格式

dict:
  cacheTTL: "0"                # 词典缓存有效期（如 168h = 7天，设为 "0" 或 0 表示永不过期）

llm:
  enabled: true                   # 是否启用 LLM 补充释义
  provider: "openai"              # 提供商: openai / deepseek / 等
  apiUrl: "http://host.docker.internal:4000"
  apiKey: "sk-aXAv96Z_MQIvrqdIziFjgw"                      # API 密钥（建议通过环境变量 LLM_API_KEY 传入）
  model: "gemini-3.5-flash"            # 模型名称
  temperature: 1.0                # LLM temperature（gpt-5-nano 等模型只支持 1）

dataDir: "/app/data"                 # SQLite 数据库与缓存目录

# === 单词卡生成配置 ===
# 修改 fields 即可增减/调整单词卡字段，无需改代码。
# fields 数组的顺序决定前端 Aspect 输出顺序。
wordcard:
  promptVersion: "v5-wordcard"   # LLM 缓存版本 key，修改后旧缓存失效
  schemaVersion: "v4"            # Schema 版本，修改字段定义后递增以清除旧缓存
  systemPrompt: |
    You are an expert English vocabulary teacher who helps Chinese learners build deep, unforgettable mental connections to English words.

    Your goal is NOT to provide dictionary definitions. The dictionary will be displayed separately. Your job is to create VIVID, CONCRETE mental anchors via the JSON structure defined by the required schema.

    Rely on your own knowledge of English etymology, word roots, usage patterns, and common learner pitfalls. The user's lookup context (if provided) tells you where they encountered this word — use it to tailor your memory hooks.

  fields:
    - key: respelling
      label: "发音拼写"
      icon: "🗣️"
      layer: core
      type: string
      required: true
      description: "Pronunciation Respelling。用常见英文字母组合标注发音，而非 IPA 音标。便于不熟悉 IPA 的学习者直接拼读。如 comprehensive → 'kom-pri-HEN-siv', comprehend → 'kom-pri-HEND', pneumonia → 'nyoo-MOH-nyuh'。重读音节大写"
    - key: breakdown
      label: "拆解"
      icon: "🧩"
      layer: core
      type: string
      required: true
      description: "词根词缀拆解骨架。格式: '前缀 (意思) + 词根 (意思) [+ 后缀 (意思)]'。如 'com- (一起) + prehendere (抓住)'"
    - key: simple_english
      label: "英译英"
      icon: "📝"
      layer: core
      type: string
      required: true
      description: "用简单英语解释这个词（英语学习者友好，用基础词汇）。如 'to understand something completely, to grasp the meaning'"
    - key: picture
      label: "词画面"
      icon: "💡"
      layer: core
      type: string
      required: true
      description: "单词描绘的画面，英语偏描述动态 (dynamic)，汉语偏描述静态 (static),用中文介绍单词的画面如果有的话"      
    - key: etymology
      label: "词源"
      icon: "📜"
      layer: core
      type: string
      required: true
      description: "词源故事。一句话说明这个单词的历史来源/演变过程。如 '来自拉丁语 comprehendere, 意为抓住、包含, 后演变为理解'"

    # === Enhancement — 区分，防止混淆 ===
    - key: contrast
      label: "易混对比"
      icon: "⚡"
      layer: enhancement
      type: string
      required: true
      description: "与易混淆词对比，有些词翻译成中文意思差不多但是在英语里表达的具体场景不同"
    - key: word_family
      label: "同根词"
      icon: "🌳"
      layer: enhancement
      type: array
      required: true
      description: "同根词列表，帮助扩展词汇。如 ['apprehend', 'comprehensive', 'prehensile']。没有则空数组"

    # === Polish — 可选，加深记忆 ===
    - key: memory_hook
      label: "记忆钩子"
      icon: "🔗"
      layer: polish
      type: string
      required: true
      description: "记忆钩子，绑定已有知识（影视、编程、游戏、小说等）。如 '韩立合掌抓丹方精髓'。没有好联想则空字符串"

    - key: register
      label: "使用语域"
      icon: "🏷️"
      layer: polish
      type: string
      required: true
      description: "使用场合（正式/口语/书面/文学/俚语/古语）。如 '偏书面/正式'。普通词空字符串"
