# Word Radar 全局配置文件
# Docker 部署时自动挂载到此文件，可通过 --config 参数指定
# 环境变量会覆盖此文件中的值（详见 README）

server:
  port: "8787"                    # 监听端口

obsidian:
  vaultPath: "/obsidian"          # Obsidian Vault 路径（容器内挂载点）
  wordsDir: "英语学习/words"        # 生词本存储目录（相对于 Vault）
  dailyNoteFormat: "Word Radar - {date}.md"  # 每日笔记文件名格式

dict:
  cacheTTL: "168h"                # 词典缓存有效期（如 168h = 7天）

llm:
  enabled: false                  # 是否启用 LLM 补充释义（Docker 默认关闭）
  provider: "openai"              # 提供商: openai / deepseek / 等
  apiUrl: "http://localhost:4000"
  apiKey: ""                      # API 密钥（建议通过环境变量 LLM_API_KEY 传入）
  model: "gpt-4o-mini"           # 模型名称
  temperature: 1.0                # LLM temperature

dataDir: "/app/data"              # SQLite 数据库与缓存目录（容器内挂载点）
